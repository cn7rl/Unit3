  <body class="text-gray-800 p-4 md:p-8">
    <!-- Header -->
    <header class="max-w-4xl mx-auto mb-8 text-center">
      <h1

        EMS Elite 200
      </h1>
      <p class="text-slate-500 mt-2 font-medium">
        Full Clinical Competency Question Set
      </p>

    <!-- Start Screen -->
    <div
      id="start-screen"

        Welcome to the Exam Simulator
      </h2>
      <p class="text-gray-600 mb-8">

      // QUIZ LOGIC
      let currentQuiz = [];
      let currentQuestionIndex = 0;
      let score = 0;

      function startQuiz() {
        // Shuffle the 200 question bank and pick the first 50
        const shuffled = [...questionBank].sort(() => 0.5 - Math.random());
        currentQuiz = shuffled.slice(0, 50);
        currentQuestionIndex = 0;
        score = 0;

        document.getElementById("start-screen").classList.add("hidden");
        document.getElementById("end-screen").classList.add("hidden");
        document.getElementById("quiz-screen").classList.remove("hidden");

        loadQuestion();
      }

      function loadQuestion() {
        // Reset UI
        document.getElementById("feedback-container").classList.add("hidden");
        document.getElementById("next-btn").classList.add("hidden");
        document.getElementById("progress-text").innerText = `Question ${
          currentQuestionIndex + 1
        } of 50`;
        document.getElementById("score-text").innerText = `Score: ${score}`;

        const qData = currentQuiz[currentQuestionIndex];
        document.getElementById("question-text").innerText = qData.q;

        const optionsContainer = document.getElementById("options-container");
        optionsContainer.innerHTML = "";

        qData.o.forEach((optText, index) => {
          const btn = document.createElement("button");
          btn.className =
            "option-btn w-full text-left bg-slate-50 border-2 border-slate-200 text-slate-700 font-medium py-4 px-6 rounded-lg";
          btn.innerText = optText;
          btn.onclick = () => selectAnswer(index, btn);
          optionsContainer.appendChild(btn);
        });
      }

      function selectAnswer(selectedIndex, btnElement) {
        const qData = currentQuiz[currentQuestionIndex];
        const isCorrect = selectedIndex === qData.a;

        // Disable all buttons
        const buttons = document.querySelectorAll(".option-btn");
        buttons.forEach((btn, idx) => {
          btn.disabled = true;
          btn.classList.add("disabled");
          // Highlight correct answer
          if (idx === qData.a) {
            btn.classList.add("correct");
          }
        });

        // Highlight selected wrong answer
        if (!isCorrect) {
          btnElement.classList.add("wrong");
        } else {
          score++;
          document.getElementById("score-text").innerText = `Score: ${score}`;
        }

        // Show Rationale
        const feedbackContainer = document.getElementById("feedback-container");
        const feedbackTitle = document.getElementById("feedback-title");
        const feedbackRationale = document.getElementById("feedback-rationale");

        feedbackContainer.classList.remove("hidden");
        feedbackContainer.classList.remove(
          "bg-green-50",
          "border-green-500",
          "text-green-800",
          "bg-red-50",
          "border-red-500",
          "text-red-800"
        );

        if (isCorrect) {
          feedbackContainer.classList.add(
            "bg-green-50",
            "border-green-500",
            "text-green-800"
          );
          feedbackTitle.innerText = "Correct!";
        } else {
          feedbackContainer.classList.add(
            "bg-red-50",
            "border-red-500",
            "text-red-800"
          );
          feedbackTitle.innerText = "Incorrect";
        }

        feedbackRationale.innerText = qData.r;

        // Show Next Button
        const nextBtn = document.getElementById("next-btn");
        nextBtn.classList.remove("hidden");
        if (currentQuestionIndex === 49) {
          nextBtn.innerText = "Finish Exam";
        } else {
          nextBtn.innerText = "Next Question \u2192";
        }
      }

      function nextQuestion() {
        currentQuestionIndex++;
        if (currentQuestionIndex < 50) {
          loadQuestion();
        } else {
          showResults();
        }
      }

      function showResults() {
        document.getElementById("quiz-screen").classList.add("hidden");
        document.getElementById("end-screen").classList.remove("hidden");

        const percentage = ((score / 50) * 100).toFixed(0);
        let colorClass = "text-red-600";
        if (percentage >= 80) colorClass = "text-green-600";
        else if (percentage >= 70) colorClass = "text-yellow-600";

        document.getElementById(
          "final-score"
        ).className = `text-5xl font-extrabold mb-8 ${colorClass}`;
        document.getElementById(
          "final-score"
        ).innerText = `${score} / 50 (${percentage}%)`;
      }
