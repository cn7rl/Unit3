      // ====================== NEW: Group questions by Chapter ======================
      function groupQuestionsByChapter() {
        const chapters = {};

        quizData.forEach((q, index) => {
          const cat = q.cat || "Unknown";
          if (!chapters[cat]) {
            chapters[cat] = [];
          }
          chapters[cat].push({ ...q, originalIndex: index });
        });

        return chapters;
      }

      let chapterGroups = groupQuestionsByChapter();
      let currentMode = "all"; // "all" or chapter key like "Chapter 22"
      let currentChapterKey = null;
      let currentShuffledIndices = [];
      let currentQuestion = 0;
      let userAnswers = [];

      // Initialize quiz in a specific mode
      function initQuiz(mode = "all", chapterKey = null) {
        currentMode = mode;
        currentChapterKey = chapterKey;
        currentQuestion = 0;

        let questionsToUse = [];

        if (mode === "all") {
          questionsToUse = quizData;
        } else if (chapterKey && chapterGroups[chapterKey]) {
          questionsToUse = chapterGroups[chapterKey].map((item) => item); // copy
        } else {
          questionsToUse = quizData;
        }

        // Create shuffled indices for current set
        currentShuffledIndices = questionsToUse.map((_, i) => i);
        shuffleArray(currentShuffledIndices);

        userAnswers = new Array(questionsToUse.length).fill(null);

        renderChapterSelector();
        renderReviewPanel();
        loadQuestion();
      }

      // Load current question (works for both modes)
      function loadQuestion() {
        const questionsToUse =
          currentMode === "all"
            ? quizData
            : chapterGroups[currentChapterKey].map((item) => item);

        if (!questionsToUse.length) return;

        const shuffledPos = currentShuffledIndices[currentQuestion];
        const q = questionsToUse[shuffledPos];

        document.getElementById("category").textContent = q.cat || "EMT Unit 5";
        document.getElementById("question").innerHTML = q.q;
        document.getElementById("current-q").textContent = `${
          currentQuestion + 1
        } of ${questionsToUse.length}`;

        const progress = ((currentQuestion + 1) / questionsToUse.length) * 100;
        document.getElementById("progress-bar").style.width = `${progress}%`;

        const optionsDiv = document.getElementById("options");
        optionsDiv.innerHTML = "";

        q.a.forEach((option, index) => {
          const div = document.createElement("div");
          div.className = `option p-5 border-2 rounded-2xl cursor-pointer text-lg ${
            userAnswers[shuffledPos] === index
              ? "selected"
              : "border-gray-200 hover:border-blue-300"
          }`;
          div.innerHTML = option;
          div.onclick = () => {
            userAnswers[shuffledPos] = index;
            loadQuestion();
            renderReviewPanel();
          };
          optionsDiv.appendChild(div);
        });

        // Show explanation if answered
        const explainDiv = document.getElementById("explanation");
        if (userAnswers[shuffledPos] !== null) {
          const isCorrect = userAnswers[shuffledPos] === q.correct;
          document.getElementById("explain-text").innerHTML = `
          <strong class="${isCorrect ? "text-emerald-700" : "text-red-700"}">
            ${isCorrect ? "✅ Correct!" : "❌ Incorrect"} — ${q.explain}
          </strong>`;
          explainDiv.classList.remove("hidden");
        } else {
          explainDiv.classList.add("hidden");
        }
      }

      // Chapter Selector UI
      function renderChapterSelector() {
        let selectorHTML = `
        <div class="mb-6 flex flex-wrap gap-2">
            <button onclick="initQuiz('all')" 
                    class="px-4 py-2 rounded-xl font-medium ${
                      currentMode === "all"
                        ? "bg-blue-600 text-white"
                        : "bg-white border border-gray-300 hover:bg-gray-50"
                    }">
                All Chapters (265)
            </button>`;

        Object.keys(chapterGroups)
          .sort()
          .forEach((chapter) => {
            const count = chapterGroups[chapter].length;
            selectorHTML += `
            <button onclick="initQuiz('${chapter}', '${chapter}')" 
                    class="px-4 py-2 rounded-xl font-medium ${
                      currentChapterKey === chapter
                        ? "bg-blue-600 text-white"
                        : "bg-white border border-gray-300 hover:bg-gray-50"
                    }">
                ${chapter} (${count} questions)
            </button>`;
          });

        selectorHTML += `</div>`;

        // Insert at the top (after header, before category)
        const existingSelector = document.getElementById("chapter-selector");
        if (existingSelector) {
          existingSelector.innerHTML = selectorHTML;
        } else {
          const header = document.querySelector(".max-w-3xl");
          const newDiv = document.createElement("div");
          newDiv.id = "chapter-selector";
          newDiv.innerHTML = selectorHTML;
          header.insertBefore(newDiv, header.children[1]); // after main header
        }
      }

      // Update review panel to work with current mode
      function renderReviewPanel() {
        const container = document.getElementById("review-list");
        container.innerHTML = "";

        const totalQuestions = currentShuffledIndices.length;

        currentShuffledIndices.forEach((shuffledPos, displayIndex) => {
          const questionsToUse =
            currentMode === "all" ? quizData : chapterGroups[currentChapterKey];
          const q = questionsToUse[shuffledPos];

          const answered = userAnswers[shuffledPos] !== null;
          const isCorrect = answered && userAnswers[shuffledPos] === q.correct;

          const btn = document.createElement("button");
          btn.textContent = displayIndex + 1;
          btn.className = `review-btn w-9 h-9 rounded-lg text-sm font-medium border flex items-center justify-center 
                        ${
                          answered
                            ? isCorrect
                              ? "correct"
                              : "wrong"
                            : "answered"
                        }`;
          btn.onclick = () => {
            currentQuestion = displayIndex;
            loadQuestion();
          };
          container.appendChild(btn);
        });

        document.getElementById("review-count").textContent =
          userAnswers.filter((a) => a !== null).length + " / " + totalQuestions;
      }

      // Navigation
      function nextQuestion() {
        if (currentQuestion < currentShuffledIndices.length - 1) {
          currentQuestion++;
          loadQuestion();
        } else {
          alert(
            `🎉 You've completed this test! (${
              currentMode === "all" ? "All Chapters" : currentChapterKey
            })`
          );
        }
      }

      function prevQuestion() {
        if (currentQuestion > 0) {
          currentQuestion--;
          loadQuestion();
        }
      }

      function shuffleArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [array[i], array[j]] = [array[j], array[i]];
        }
      }

      // Keyboard support
      document.addEventListener("keydown", (e) => {
        if (e.key === "ArrowRight") nextQuestion();
        if (e.key === "ArrowLeft") prevQuestion();
      });

      // Start the quiz
      window.onload = () => {
        initQuiz("all"); // Start with full test by default
      };
    </script>
